name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-event-api:
    name: Event API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: services/event-api
        run: npm install

      - name: Run tests
        working-directory: services/event-api
        run: npx jest --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: event-api-coverage
          path: services/event-api/coverage/

  test-consumer:
    name: Consumer Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: services/consumer
        run: npm install

      - name: Run tests
        working-directory: services/consumer
        run: npx jest --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-coverage
          path: services/consumer/coverage/

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [test-event-api, test-consumer]

    steps:
      - uses: actions/checkout@v4

      - name: Build Event API
        run: docker build -t ts-event-api ./services/event-api

      - name: Build Consumer
        run: docker build -t ts-consumer ./services/consumer

      - name: Build Stats API
        run: docker build -t ts-stats-api ./services/stats-api

      - name: Build Simulator
        run: docker build -t ts-simulator ./services/simulator

      - name: Build Dashboard
        run: docker build -t ts-dashboard ./services/dashboard