services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ts-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - threatstream

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ts-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://98.93.154.29:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - threatstream

  postgres:
    image: postgres:16-alpine
    container_name: ts-postgres
    environment:
      POSTGRES_DB: threatstream
      POSTGRES_USER: threatstream
      POSTGRES_PASSWORD: threatstream_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatstream"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - threatstream

  event-api:
    build: ./services/event-api
    container_name: ts-event-api
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: event-api
      NODE_ENV: production
      API_KEYS: dev-key-001,dev-key-002,simulator-key
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - threatstream

  consumer:
    build: ./services/consumer
    container_name: ts-consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: threatstream-consumer
      KAFKA_CLIENT_ID: consumer
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: threatstream
      DB_USER: threatstream
      DB_PASSWORD: threatstream_dev
      NODE_ENV: production
    networks:
      - threatstream

  stats-api:
    build: ./services/stats-api
    container_name: ts-stats-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: threatstream
      DB_USER: threatstream
      DB_PASSWORD: threatstream_dev
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - threatstream

  simulator:
    build: ./services/simulator
    container_name: ts-simulator
    depends_on:
      event-api:
        condition: service_healthy
    environment:
      EVENT_API_URL: http://event-api:3001
      EVENTS_PER_SECOND: 100
      SIMULATOR_MODE: mixed
      API_KEY: simulator-key
    networks:
      - threatstream
    profiles:
      - demo

  dashboard:
    build: ./services/dashboard
    container_name: ts-dashboard
    depends_on:
      stats-api:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - threatstream

volumes:
  postgres_data:

networks:
  threatstream:
    driver: bridge